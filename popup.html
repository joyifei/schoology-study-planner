<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schoology Study Planner</title>
    <link rel="stylesheet" href="src/popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Schoology</p>
          <h1>Study Planner</h1>
        </div>
        <button id="syncButton" type="button" title="Sync current Schoology page">
          Sync
        </button>
      </header>

      <section class="status-row" aria-live="polite">
        <span id="syncStatus">Open Schoology, then sync.</span>
        <span id="lastUpdated"></span>
      </section>

      <section class="summary-grid" aria-label="Homework summary">
        <div class="summary-item urgent">
          <span id="overdueCount">0</span>
          <p>Overdue</p>
        </div>
        <div class="summary-item today">
          <span id="todayCount">0</span>
          <p>Today</p>
        </div>
        <div class="summary-item week">
          <span id="weekCount">0</span>
          <p>7 Days</p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Homework</h2>
          <select id="filterSelect" aria-label="Filter homework">
            <option value="all">All</option>
            <option value="overdue">Overdue</option>
            <option value="today">Due today</option>
            <option value="week">Next 7 days</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Course</th>
                <th>Assignment</th>
                <th>Due</th>
                <th>Status</th>
                <th>Min</th>
                <th>Done</th>
              </tr>
            </thead>
            <tbody id="taskTable"></tbody>
          </table>
        </div>
        <p id="emptyState" class="empty-state">No homework captured yet.</p>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Today Plan</h2>
          <span id="planTotal" class="plan-total"></span>
          <button id="clearButton" class="ghost" type="button" title="Clear saved homework">
            Clear
          </button>
        </div>
        <ol id="planList" class="plan-list"></ol>
      </section>
    </main>
    <script src="src/popup.js"></script>
  </body>
</html>
